version: "1.0"

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
settings:
  headerRow: 0              # 0-based row index of the header row
  dataStartRow: 1           # 0-based row index where data rows begin
  trimCellValues: true      # strip leading/trailing whitespace from each cell
  ignoreBlankRows: true     # skip rows where every cell is blank
  caseSensitiveHeaders: false
  caseSensitiveValues: true


# ---------------------------------------------------------------------------
# Cross-sheet (workbook-level) rules
# ---------------------------------------------------------------------------
workbook_rules:

  # every value in source must exist in target (subset)
  - subset:
      from: <SheetName>.<ColumnName>
      to:   <SheetName>.<ColumnName>

  # source must contain all values from target (superset)
  - superset:
      from: <SheetName>.<ColumnName>
      to:   <SheetName>.<ColumnName>

  # values must not appear in both columns simultaneously
  - unique:
      columns: [<SheetName>.<ColumnName>, <SheetName>.<ColumnName>]

  # every row in source must match a row in target
  - match:
      from: <SheetName>.<ColumnName>
      to:   <SheetName>.<ColumnName>


# ---------------------------------------------------------------------------
# Custom validator registry
# ---------------------------------------------------------------------------
validators:
  <validatorName>:
    class: "<fully.qualified.ClassName>"
    description: "<description>"

# ---------------------------------------------------------------------------
# Sheet definitions
# ---------------------------------------------------------------------------
sheets:

  <SheetName>:
    required: true
    aliases: []               # alternative sheet names accepted during validation
    settings:
      headerRow: 0            # override any global setting for this sheet only
      ignoreBlankRows: false  # include blank rows in the middle of data

    columns:

      # ── string column ────────────────────────────────────────────────────
      <ColumnName>:
        required: true
        type: string
        aliases: []
        unique: false
        ignoreCase: false     # case-insensitive comparison for allowedValues / values
        minLength: 1
        maxLength: 100
        pattern: "<regex>"
        allowedValues: [<value>, <value>]    # enforced set of allowed strings
        ref: <SheetName>.<ColumnName>
        validator: <validatorName>
        messages:
          required:  "<custom message>"
          minLength: "<custom message>"
          maxLength: "<custom message>"
          pattern:   "<custom message>"
          type:      "<custom message>"      # generic type/format error fallback

      # ── integer column ───────────────────────────────────────────────────
      <ColumnName>:
        required: true
        type: integer
        minValue: 1           # inclusive lower bound
        maxValue: 100         # inclusive upper bound
        allowedRanges:        # value must fall within at least one band (OR logic)
          - { min: <min>, max: <max> }
          - { min: <min>, max: <max> }
        messages:
          min:  "<custom message>"
          max:  "<custom message>"
          type: "<custom message>"

      # ── decimal column ───────────────────────────────────────────────────
      <ColumnName>:
        required: true
        type: decimal
        minDecimal: 0.00
        maxDecimal: 9999.99
        precision: 2          # maximum number of decimal places allowed
        messages:
          precision: "<custom message>"
          type:      "<custom message>"

      # ── datetime column ──────────────────────────────────────────────────
      <ColumnName>:
        required: false
        type: datetime
        format: "yyyy-MM-dd'T'HH:mm:ss"   # default: yyyy-MM-dd'T'HH:mm:ss
        messages:
          format: "<custom message>"

      # ── email column ─────────────────────────────────────────────────────
      <ColumnName>:
        required: true
        type: email
        multi: false          # true = comma-separated list of addresses is allowed
        messages:
          type: "<custom message>"

      # ── ip column ────────────────────────────────────────────────────────
      <ColumnName>:
        required: false
        type: ip
        accepts: both         # ipv4 | ipv6 | both (default: ipv4)
        messages:
          type: "<custom message>"

      # ── sheetRef column ──────────────────────────────────────────────────
      # Value must match an existing sheet name in the workbook.
      # Useful for Index sheets where a column lists table/sheet names.
      <ColumnName>:
        required: true
        sheetRef: true
        sheetRefIgnoreCase: false   # true = "announcement_files" matches "ANNOUNCEMENT_FILES"
        messages:
          type: "<custom message>"

      # ── custom validator column ──────────────────────────────────────────
      <ColumnName>:
        required: false
        type: custom
        validator: <validatorName>


    # -------------------------------------------------------------------------
    # Row rules — applied to every data row in the sheet
    # -------------------------------------------------------------------------
    #
    # Column reference convention (applies to ALL rule types):
    #   ColumnName              → column in the current sheet (default)
    #   SheetName.ColumnName    → column in the named sheet
    #
    # This notation is valid everywhere a column name appears:
    # require, forbid, when.column, compare, one_of, only_one, all_or_none, sum, equals.
    # -------------------------------------------------------------------------
    rules:

      # require — with when condition
      - require: <ColumnName>
        when:
          column: <ColumnName>                   # same sheet
          operator: equals                       # equals | notEquals | blank | notBlank | contains
          value: <value>                         # (not used for blank / notBlank)

      - require: <SheetName>.<ColumnName>
        when:
          column: <SheetName>.<ColumnName>       # cross-sheet column in when condition
          operator: notBlank


      # forbid — with when condition
      - forbid: <ColumnName>
        when:
          column: <ColumnName>
          operator: notBlank

      - forbid: <SheetName>.<ColumnName>
        when:
          column: <ColumnName>
          operator: notBlank

      # require with a numeric comparison condition
      - require: <ColumnName>
        when:
          column: <SheetName>.<ColumnName>       # SheetName optional; defaults to current sheet
          operator: greaterThan                  # greaterThan | greaterThanOrEquals | lessThan | lessThanOrEquals
          value: <value>

      # require with compound condition (AND / OR nesting)
      - require: <ColumnName>
        when:
          all:
            - column: <ColumnName>
              operator: equals
              value: <value>
            - any:
                - column: <SheetName>.<ColumnName>
                  operator: greaterThan
                  value: <value>
                - column: <ColumnName>
                  operator: blank

      # cross-sheet existence check in when (sheet: field)
      - require: <ColumnName>
        when:
          sheet: <SheetName>                     # look up current row's <column> value in this sheet
          column: <ColumnName>
          operator: exists                       # exists | notExists

      # cross-column comparison — SheetName optional on both sides
      # Supported operators: equals, notEquals, greaterThan, greaterThanOrEquals, lessThan, lessThanOrEquals
      - compare: "<ColumnA> lessThanOrEquals <ColumnB>"
      - compare: "<SheetA>.<ColumnA> greaterThan <SheetB>.<ColumnB>"

      # group presence — SheetName optional in any element
      - one_of:    [<ColumnA>, <SheetName>.<ColumnB>]
      - only_one:  [<ColumnA>, <ColumnB>]
      - all_or_none: [<ColumnA>, <SheetName>.<ColumnB>, <ColumnC>]

      # sum — SheetName optional in any element
      - sum: [<ColumnA>, <SheetName>.<ColumnB>]
        equals: <ColumnC>


# ---------------------------------------------------------------------------
# Post-validation outputs
# ---------------------------------------------------------------------------
# Computed only when validation PASSES.
# Each entry is added to ValidationReport.parameters and printed to stdout
# as KEY=VALUE.  The YAML map key is used as the parameter name unless the
# optional 'name' field overrides it.
#
# Supported aggregates:
#   distinct  — sorted, deduplicated non-blank values joined by 'separator' (default ",")
#   count     — number of non-blank rows for 'column'; total row count when 'column' is omitted
#   sum       — numeric sum of 'column' values (non-numeric cells silently ignored)
# ---------------------------------------------------------------------------
outputs:

  # Distinct values from a column (comma-separated)
  <PARAM_NAME>:
    sheet: <SheetName>
    column: <ColumnName>
    aggregate: distinct
    separator: ","              # optional — defaults to ","

  # Count of non-blank values in a column
  <PARAM_NAME>:
    sheet: <SheetName>
    column: <ColumnName>
    aggregate: count

  # Total row count for a sheet (column omitted)
  <PARAM_NAME>:
    sheet: <SheetName>
    aggregate: count

  # Numeric sum of a column
  <PARAM_NAME>:
    sheet: <SheetName>
    column: <ColumnName>
    aggregate: sum

  # Override the parameter name stored in the report
  <yaml_key>:
    name: <PARAM_NAME>          # emitted as PARAM_NAME instead of yaml_key
    sheet: <SheetName>
    column: <ColumnName>
    aggregate: distinct


# ---------------------------------------------------------------------------
# JSON output template
# ---------------------------------------------------------------------------
# When json_output is present, each segregation unit (CR / Group / Node)
# produces ONE structured JSON file whose shape mirrors this YAML tree.
# When json_output is absent the default CiqSheet / index format is used.
#
# The entire json_output block is a free-form YAML tree evaluated as a
# template.  Every key becomes a JSON key; values follow the rules below.
#
# ── Value resolution rules ────────────────────────────────────────────────
#
#   Plain string (no "$", no ".")
#       → Written as a static string literal.
#         Inside an _each: <SheetName> block the string is treated as a
#         column name and the cell value for the current row is used instead.
#
#   "SheetName.ColumnName"  (contains ".", no WHERE)
#       → First non-blank cell value from the filtered rows of that
#         sheet + column combination.
#
#   "Sheet.Column WHERE [Sheet.]FilterColumn = $var_or_literal"
#       → Relational lookup: scans the sheet's filtered rows and returns
#         the first non-blank Column value where FilterColumn equals the
#         resolved filter value.  The sheet prefix on the filter column is
#         optional (defaults to the same sheet as the target).
#         Column names that contain spaces must be wrapped in single quotes.
#         Examples:
#           niamID: "Node_Details.'NIAM NAME' WHERE Node_Details.Node_Name = $node"
#           email:  "USER_ID.EMAIL            WHERE USER_ID.CRGroup        = $group"
#
#   "$node"          → Current node name       (set by _each: nodes)
#   "$niamID"        → NIAM ID for $node       (set by _each: nodes)
#   "$group"         → Current group name      (set by _each: nodes / groups)
#   "$nodes"         → List of node names in $group  (set by _each: groups)
#   "$niamMapping"   → { node: niamID, … } map for $group (set by _each: groups)
#
# ── Array blocks ─────────────────────────────────────────────────────────
#
#   _each: nodes
#       Expands into one element per node in the current segregation unit.
#       Sets $node, $niamID, and $group in child context.
#       Filtered rows inside this block are scoped to the node's group.
#
#   _each: groups
#       Expands into one element per group in the current segregation unit.
#       Sets $group, $nodes, and $niamMapping in child context.
#       Filtered rows inside this block are scoped to that group's rows.
#
#   _each: <SheetName>
#       Expands into one element per filtered row of the named sheet.
#       Inside this block, plain strings are resolved as column names in
#       the current row.  Use relational WHERE lookups to fetch related
#       data from other sheets using the current row's column values.
#
#   _each: "<SheetName> WHERE [<Sheet>.]FilterCol = value"
#       Same as above but only iterates rows where FilterCol equals the
#       resolved value.  The value follows the same resolution rules:
#       $variable, Sheet.Col, current-row column name, or literal string.
#       Example:
#         _each: "ANNOUNCEMENT_FILES WHERE GROUP = GROUP"
#         (the right-hand GROUP is the current row's GROUP column value)
#
# ── Nested objects ────────────────────────────────────────────────────────
#
#   Any map without an _each key is treated as a nested object and all
#   its keys are resolved recursively using the same rules above.
#
# ── Segregation modes ─────────────────────────────────────────────────────
#
#   NODE mode    — one file per node;  $node / $niamID available at top level
#   GROUP mode   — one file per group; $group / $nodes / $niamMapping available
#   CRGROUP mode — one file per CR;    use _each: groups or _each: nodes to
#                  expand the nested structure
#
# ── Examples ──────────────────────────────────────────────────────────────
#
# Example 1 — flat per-group file (GROUP mode)
#
#   json_output:
#     nodeType:  MRF
#     activity:  ANNOUNCEMENT_LOADING
#     nodes:     $nodes
#     niamMapping: $niamMapping
#     files:
#       _each: ANNOUNCEMENT_FILES
#       inputFile:   INPUT_FILE
#       destination: MRF_DESTINATION_PATH
#
# Example 2 — per-node expansion within a CR (CRGROUP mode)
#
#   json_output:
#     nodeType: MRF
#     activity: ANNOUNCEMENT_LOADING
#     crGroup:  CR1
#     nodes:
#       _each: nodes
#       node:    $node
#       niamID:  $niamID
#       tableData:
#         _each: ANNOUNCEMENT_FILES
#         INPUT_FILE:           INPUT_FILE
#         MRF_DESTINATION_PATH: MRF_DESTINATION_PATH
#
# Example 3 — group array within a CR (CRGROUP mode)
#
#   json_output:
#     crGroup: CR1
#     groups:
#       _each: groups
#       group:       $group
#       nodes:       $nodes
#       niamMapping: $niamMapping
#       tableData:
#         _each: ANNOUNCEMENT_FILES
#         INPUT_FILE:           INPUT_FILE
#         MRF_DESTINATION_PATH: MRF_DESTINATION_PATH
#
# ---------------------------------------------------------------------------


# ---------------------------------------------------------------------------
# JSON output template
# ---------------------------------------------------------------------------
# The json_output block has exactly two top-level keys:
#
#   output_mode  — controls output granularity (required; see values below)
#   data         — the JSON template tree evaluated by JsonTemplateEvaluator
#
# output_mode values:
#   individual  — one JSON per segregation unit; grouping auto-detected from the
#                 workbook structure (CRGROUP → per CR, GROUP → per group,
#                 NODE → per node).  Default when output_mode is absent.
#   single      — one JSON file for the entire workbook.
#
# In single mode the following additional template directives are available:
#   _each: crs                         iterates all unique CRGroup values; exposes $cr
#   _each: "Index WHERE CRGroup = $cr" scopes Index rows to the current CR
#   $cr                                current CRGroup name (set by _each: crs)
# ---------------------------------------------------------------------------
json_output:
  output_mode: individual      # individual (default) | single

  data:
    <jsonKey>: <static value>              # plain string written as-is
    <jsonKey>: <SheetName>.<ColumnName>    # first non-blank value from sheet+column
    <jsonKey>: "<SheetName>.<ColumnName> WHERE [<SheetName>.]<FilterCol> = $var"  # relational lookup
    <jsonKey>: $node                       # iteration variable (inside _each: nodes)
    <jsonKey>: $niamID
    <jsonKey>: $group
    <jsonKey>: $nodes                      # List<String> — serialised as JSON array
    <jsonKey>: $niamMapping                # Map<String,String> — serialised as JSON object
    <jsonKey>: $cr                         # current CRGroup name (set by _each: crs)

    # ── Array expanding over all CRGroups (single output_mode) ─────────────
    <jsonArrayKey>:
      _each: crs
      <jsonKey>: $cr
      <nestedArrayKey>:
        _each: "Index WHERE CRGroup = $cr"
        <jsonKey>: <ColumnName>

    # ── Array from sheet rows ──────────────────────────────────────────────
    <jsonArrayKey>:
      _each: <SheetName>
      <jsonKey>: <ColumnName>              # column name in the current row
      <jsonKey>: <ColumnName>

    # ── Array expanding over nodes ─────────────────────────────────────────
    <jsonArrayKey>:
      _each: nodes
      <jsonKey>: $node
      <jsonKey>: $niamID
      <nestedArrayKey>:                    # nested sheet array per node
        _each: <SheetName>
        <jsonKey>: <ColumnName>

    # ── Array expanding over groups ────────────────────────────────────────
    <jsonArrayKey>:
      _each: groups
      <jsonKey>: $group
      <jsonKey>: $nodes
      <jsonKey>: $niamMapping
      <nestedArrayKey>:
        _each: <SheetName>
        <jsonKey>: <ColumnName>

    # ── Nested object (no _each) ───────────────────────────────────────────
    <jsonObjectKey>:
      <jsonKey>: <SheetName>.<ColumnName>
      <jsonKey>: <static value>
