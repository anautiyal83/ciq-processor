version: "1.0"

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
settings:
  headerRow: 0              # 0-based row index of the header row
  dataStartRow: 1           # 0-based row index where data rows begin
  trimCellValues: true      # strip leading/trailing whitespace from each cell
  ignoreBlankRows: true     # skip rows where every cell is blank
  caseSensitiveHeaders: false
  caseSensitiveValues: true


# ---------------------------------------------------------------------------
# Cross-sheet (workbook-level) rules
# ---------------------------------------------------------------------------
workbook_rules:

  # every value in source must exist in target (subset)
  - subset:
      from: <SheetName>.<ColumnName>
      to:   <SheetName>.<ColumnName>

  # source must contain all values from target (superset)
  - superset:
      from: <SheetName>.<ColumnName>
      to:   <SheetName>.<ColumnName>

  # values must not appear in both columns simultaneously
  - unique:
      columns: [<SheetName>.<ColumnName>, <SheetName>.<ColumnName>]

  # every row in source must match a row in target
  - match:
      from: <SheetName>.<ColumnName>
      to:   <SheetName>.<ColumnName>


# ---------------------------------------------------------------------------
# Custom validator registry
# ---------------------------------------------------------------------------
validators:
  <validatorName>:
    class: "<fully.qualified.ClassName>"
    description: "<description>"

# ---------------------------------------------------------------------------
# Sheet definitions
# ---------------------------------------------------------------------------
sheets:

  <SheetName>:
    required: true
    aliases: []               # alternative sheet names accepted during validation
    settings:
      headerRow: 0            # override any global setting for this sheet only
      ignoreBlankRows: false  # include blank rows in the middle of data

    columns:

      # ── string column ────────────────────────────────────────────────────
      <ColumnName>:
        required: true
        type: string
        aliases: []
        unique: false
        ignoreCase: false     # case-insensitive comparison for allowedValues / values
        minLength: 1
        maxLength: 100
        pattern: "<regex>"
        allowedValues: [<value>, <value>]    # enforced set of allowed strings
        ref: <SheetName>.<ColumnName>
        validator: <validatorName>
        messages:
          required:  "<custom message>"
          minLength: "<custom message>"
          maxLength: "<custom message>"
          pattern:   "<custom message>"
          type:      "<custom message>"      # generic type/format error fallback

      # ── integer column ───────────────────────────────────────────────────
      <ColumnName>:
        required: true
        type: integer
        minValue: 1           # inclusive lower bound
        maxValue: 100         # inclusive upper bound
        allowedRanges:        # value must fall within at least one band (OR logic)
          - { min: <min>, max: <max> }
          - { min: <min>, max: <max> }
        messages:
          min:  "<custom message>"
          max:  "<custom message>"
          type: "<custom message>"

      # ── decimal column ───────────────────────────────────────────────────
      <ColumnName>:
        required: true
        type: decimal
        minDecimal: 0.00
        maxDecimal: 9999.99
        precision: 2          # maximum number of decimal places allowed
        messages:
          precision: "<custom message>"
          type:      "<custom message>"

      # ── datetime column ──────────────────────────────────────────────────
      <ColumnName>:
        required: false
        type: datetime
        format: "yyyy-MM-dd'T'HH:mm:ss"   # default: yyyy-MM-dd'T'HH:mm:ss
        messages:
          format: "<custom message>"

      # ── email column ─────────────────────────────────────────────────────
      <ColumnName>:
        required: true
        type: email
        multi: false          # true = comma-separated list of addresses is allowed
        messages:
          type: "<custom message>"

      # ── ip column ────────────────────────────────────────────────────────
      <ColumnName>:
        required: false
        type: ip
        accepts: both         # ipv4 | ipv6 | both (default: ipv4)
        messages:
          type: "<custom message>"

      # ── sheetRef column ──────────────────────────────────────────────────
      # Value must match an existing sheet name in the workbook.
      # Useful for Index sheets where a column lists table/sheet names.
      <ColumnName>:
        required: true
        sheetRef: true
        sheetRefIgnoreCase: false   # true = "announcement_files" matches "ANNOUNCEMENT_FILES"
        messages:
          type: "<custom message>"

      # ── custom validator column ──────────────────────────────────────────
      <ColumnName>:
        required: false
        type: custom
        validator: <validatorName>


    # -------------------------------------------------------------------------
    # Row rules — applied to every data row in the sheet
    # -------------------------------------------------------------------------
    #
    # Column reference convention (applies to ALL rule types):
    #   ColumnName              → column in the current sheet (default)
    #   SheetName.ColumnName    → column in the named sheet
    #
    # This notation is valid everywhere a column name appears:
    # require, forbid, when.column, compare, one_of, only_one, all_or_none, sum, equals.
    # -------------------------------------------------------------------------
    rules:

      # require — with when condition
      - require: <ColumnName>
        when:
          column: <ColumnName>                   # same sheet
          operator: equals                       # equals | notEquals | blank | notBlank | contains
          value: <value>                         # (not used for blank / notBlank)

      - require: <SheetName>.<ColumnName>
        when:
          column: <SheetName>.<ColumnName>       # cross-sheet column in when condition
          operator: notBlank


      # forbid — with when condition
      - forbid: <ColumnName>
        when:
          column: <ColumnName>
          operator: notBlank

      - forbid: <SheetName>.<ColumnName>
        when:
          column: <ColumnName>
          operator: notBlank

      # require with a numeric comparison condition
      - require: <ColumnName>
        when:
          column: <SheetName>.<ColumnName>       # SheetName optional; defaults to current sheet
          operator: greaterThan                  # greaterThan | greaterThanOrEquals | lessThan | lessThanOrEquals
          value: <value>

      # require with compound condition (AND / OR nesting)
      - require: <ColumnName>
        when:
          all:
            - column: <ColumnName>
              operator: equals
              value: <value>
            - any:
                - column: <SheetName>.<ColumnName>
                  operator: greaterThan
                  value: <value>
                - column: <ColumnName>
                  operator: blank

      # cross-sheet existence check in when (sheet: field)
      - require: <ColumnName>
        when:
          sheet: <SheetName>                     # look up current row's <column> value in this sheet
          column: <ColumnName>
          operator: exists                       # exists | notExists

      # cross-column comparison — SheetName optional on both sides
      # Supported operators: equals, notEquals, greaterThan, greaterThanOrEquals, lessThan, lessThanOrEquals
      - compare: "<ColumnA> lessThanOrEquals <ColumnB>"
      - compare: "<SheetA>.<ColumnA> greaterThan <SheetB>.<ColumnB>"

      # group presence — SheetName optional in any element
      - one_of:    [<ColumnA>, <SheetName>.<ColumnB>]
      - only_one:  [<ColumnA>, <ColumnB>]
      - all_or_none: [<ColumnA>, <SheetName>.<ColumnB>, <ColumnC>]

      # sum — SheetName optional in any element
      - sum: [<ColumnA>, <SheetName>.<ColumnB>]
        equals: <ColumnC>


# ---------------------------------------------------------------------------
# Post-validation outputs
# ---------------------------------------------------------------------------
# Computed only when validation PASSES.
# Each entry is added to ValidationReport.parameters and printed to stdout
# as KEY=VALUE.  The YAML map key is used as the parameter name unless the
# optional 'name' field overrides it.
#
# Supported aggregates:
#   distinct  — deduplicated non-blank values from 'column' joined by 'separator' (default ",")
#   count     — number of non-blank rows for 'column'; total row count when 'column' is omitted
#   sum       — numeric sum of 'column' values (non-numeric cells silently ignored)
#   group     — groups distinct 'column' values by each distinct 'groupBy' value;
#               emits one parameter per group: <PARAM_NAME>_<groupValue> = joined column values.
#               Requires both 'column' and 'groupBy'.
#               Example: NODES_BY_CR_CR001=MRF1,MRF2  NODES_BY_CR_CR002=MRF3
# ---------------------------------------------------------------------------
outputs:

  # Distinct values from a column (comma-separated)
  <PARAM_NAME>:
    sheet: <SheetName>
    column: <ColumnName>
    aggregate: distinct
    separator: ","              # optional — defaults to ","

  # Count of non-blank values in a column
  <PARAM_NAME>:
    sheet: <SheetName>
    column: <ColumnName>
    aggregate: count

  # Total row count for a sheet (column omitted)
  <PARAM_NAME>:
    sheet: <SheetName>
    aggregate: count

  # Numeric sum of a column
  <PARAM_NAME>:
    sheet: <SheetName>
    column: <ColumnName>
    aggregate: sum

  # Group: one parameter per distinct groupBy value
  # Emits <PARAM_NAME>_<groupValue> = joined column values
  <PARAM_NAME>:
    sheet: <SheetName>
    groupBy: <GroupByColumnName>
    column: <ColumnName>
    aggregate: group
    separator: ","              # optional — defaults to ","

  # Override the parameter name stored in the report
  <yaml_key>:
    name: <PARAM_NAME>          # emitted as PARAM_NAME instead of yaml_key
    sheet: <SheetName>
    column: <ColumnName>
    aggregate: distinct


# ---------------------------------------------------------------------------
# JSON output template
# ---------------------------------------------------------------------------
# The json_output block supports the following top-level keys:
#
#   output_mode   — controls how many JSON files are produced (required)
#   segregate_by  — required when output_mode=individual; defines the split key
#   data          — the JSON template tree evaluated by JsonTemplateEvaluator
#
# ── output_mode ───────────────────────────────────────────────────────────
#
#   single      — one JSON file for the entire workbook.
#                 File name: <NODE_TYPE>_<ACTIVITY>.json
#
#   individual  — one JSON file per distinct value of the segregate_by column.
#                 File name: <NODE_TYPE>_<ACTIVITY>_<value>.json
#                 Requires a 'segregate_by' block (see below).
#                 Default when output_mode is absent.
#
# ── segregate_by (required for output_mode: individual) ───────────────────
#
#   sheet:  <SheetName>   # any sheet in the workbook (use 'Index' for the index sheet)
#   column: <ColumnName>  # one output file is created per distinct value of this column
#   as:     $<varname>    # variable injected into the template for the current value
#                         # optional — defaults to $unit
#
#   The named sheet is pre-scoped to matching rows for each iteration value.
#   All other sheets remain fully accessible so the template can cross-reference
#   freely using WHERE conditions.
#
#   Examples:
#     segregate_by:            # one file per CRGroup value in the Index sheet
#       sheet:  Index
#       column: CRGroup
#       as:     $cr
#
#     segregate_by:            # one file per Node value in the Index sheet
#       sheet:  Index
#       column: Node
#       as:     $node
#
#     segregate_by:            # one file per Group value in the Index sheet
#       sheet:  Index
#       column: Group
#       as:     $grp
#
# ── Value resolution rules ────────────────────────────────────────────────
#
#   Plain string (no "$", no ".")
#       Inside a row-iteration block (_each: Sheet or _each: "Sheet WHERE…"):
#         treated as a column name; the cell value for the current row is used.
#       Outside a row block:
#         written as a static string literal.
#
#   "SheetName.ColumnName"  (contains ".", no WHERE)
#       First non-blank value from the (scoped) rows of that sheet + column.
#       Column names containing spaces must be wrapped in single quotes:
#         "Node_Details.'NIAM NAME'"
#
#   "Sheet.Column WHERE [Sheet.]FilterCol = value"
#       Relational lookup: scans the sheet's rows and returns the first
#       non-blank Column value where FilterCol equals the resolved value.
#       The sheet prefix on FilterCol is optional.
#       value may be a $variable, Sheet.Col reference, current-row column, or literal.
#       Examples:
#         niamID: "Node_Details.'NIAM NAME' WHERE Node_Details.Node_Name = $node"
#         email:  "USER_ID.EMAIL WHERE USER_ID.CRGroup = $cr"
#
#   $<varname>
#       Resolves a named variable — either from 'segregate_by.as' or from a
#       DISTINCT iteration inside the template.
#       Any name defined via "DISTINCT … AS $varname" is also available here.
#
# ── Array directives (_each) ─────────────────────────────────────────────
#
#   _each: "DISTINCT [FROM] <Sheet>.<Column> [AS $<varname>]"
#       RECOMMENDED — fully generic.
#       Iterates distinct (deduplicated) values of Column from Sheet.
#       Sets $varname to each value in the child context.
#       Scopes Sheet's rows to the current value so that Sheet.AnyColumn
#       lookups automatically return per-value data without extra WHERE clauses.
#       "FROM" keyword and "AS $varname" are both optional; $item is used when omitted.
#       Examples:
#         _each: "DISTINCT Index.Node AS $node"
#         _each: "DISTINCT FROM Index.CRGroup AS $cr"
#         _each: "DISTINCT Index.Group AS $group"
#
#   _each: <SheetName>
#       Iterates every row of SheetName.
#       Inside this block, plain strings resolve as column names in the current row.
#
#   _each: "[<Sheet>.<Column> |] <SheetName> WHERE [<Sheet>.]FilterCol = value"
#       Iterates rows of SheetName where FilterCol equals the resolved value.
#       An optional "Sheet.Column" prefix before WHERE is supported as a column hint
#       (the sheet name is extracted from it; the column hint itself is ignored).
#       value follows the same resolution rules: $variable, Sheet.Col, column name, literal.
#       Examples:
#         _each: "ANNOUNCEMENT_FILES WHERE GROUP = Index.GROUP"
#         _each: "Index.Node WHERE Index.CRGroup = $cr"   # hint: iterating Node column
#
# ── Nested objects ────────────────────────────────────────────────────────
#
#   Any map without an _each key is treated as a nested object and all
#   its keys are resolved recursively.
#
# ── Examples ──────────────────────────────────────────────────────────────
#
# Example 1 — one file per CRGroup (individual output_mode)
#   Produces: MRF_ANNOUNCEMENT_LOADING_CR001.json, MRF_ANNOUNCEMENT_LOADING_CR002.json …
#
#   json_output:
#     output_mode: individual
#     segregate_by:
#       sheet:  Index
#       column: CRGroup
#       as:     $cr
#     data:
#       nodeType: MRF
#       activity: ANNOUNCEMENT_LOADING
#       crGroup:  $cr
#       email:    "USER_ID.EMAIL WHERE USER_ID.CRGroup = $cr"
#       nodes:
#         _each: "Index.Node WHERE Index.CRGroup = $cr"
#         node:   Node
#         niamID: "Node_Details.'NIAM NAME' WHERE Node_Details.Node_Name = Node"
#         tableData:
#           _each: "ANNOUNCEMENT_FILES WHERE GROUP = Index.GROUP"
#           INPUT_FILE:           INPUT_FILE
#           MRF_DESTINATION_PATH: MRF_DESTINATION_PATH
#
# Example 2 — single file, all CRs and nodes (single output_mode)
#   Produces: MRF_ANNOUNCEMENT_LOADING.json
#
#   json_output:
#     output_mode: single
#     data:
#       nodeType: MRF
#       activity: ANNOUNCEMENT_LOADING
#       crs:
#         _each: "DISTINCT FROM Index.CRGroup AS $cr"
#         crGroup: $cr
#         email:   "USER_ID.EMAIL WHERE USER_ID.CRGroup = $cr"
#         nodes:
#           _each: "Index.Node WHERE Index.CRGroup = $cr"
#           node:   Node
#           niamID: "Node_Details.'NIAM NAME' WHERE Node_Details.Node_Name = Node"
#           tableData:
#             _each: "ANNOUNCEMENT_FILES WHERE GROUP = Index.GROUP"
#             INPUT_FILE:           INPUT_FILE
#             MRF_DESTINATION_PATH: MRF_DESTINATION_PATH
#
# Example 3 — one file per Node (individual output_mode, node-wise)
#
#   json_output:
#     output_mode: individual
#     segregate_by:
#       sheet:  Index
#       column: Node
#       as:     $node
#     data:
#       nodeType: MRF
#       node:     $node
#       niamID:   "Node_Details.'NIAM NAME' WHERE Node_Details.Node_Name = $node"
#       tableData:
#         _each: ANNOUNCEMENT_FILES
#         INPUT_FILE:           INPUT_FILE
#         MRF_DESTINATION_PATH: MRF_DESTINATION_PATH
#
# ---------------------------------------------------------------------------
json_output:
  output_mode: individual      # individual (default) | single

  # Required for output_mode: individual — defines the file-splitting key
  segregate_by:
    sheet:  <SheetName>        # any sheet (use 'Index' for the index sheet)
    column: <ColumnName>       # one file per distinct value of this column
    as:     $<varname>         # variable injected into the template (default: $unit)

  data:
    <jsonKey>: <static value>              # plain string written as-is
    <jsonKey>: <SheetName>.<ColumnName>    # first non-blank value from sheet+column
    <jsonKey>: "<Sheet>.<Col> WHERE [<Sheet>.]<FilterCol> = $var"   # relational lookup
    <jsonKey>: $<varname>                  # variable from segregate_by or DISTINCT

    # ── Generic distinct-value array (RECOMMENDED) ─────────────────────────
    <jsonArrayKey>:
      _each: "DISTINCT <Sheet>.<Column> AS $<varname>"
      <jsonKey>: $<varname>
      <jsonKey>: <Sheet>.<Column>          # auto-scoped to current value's rows
      <jsonKey>: "<Sheet>.<Col> WHERE <Sheet>.<FilterCol> = $<varname>"
      <nestedArrayKey>:
        _each: "<DataSheet> WHERE <Col> = <Sheet>.<Col>"
        <jsonKey>: <ColumnName>

    # ── Row-iteration array ─────────────────────────────────────────────────
    <jsonArrayKey>:
      _each: <SheetName>
      <jsonKey>: <ColumnName>              # column name in the current row

    # ── Filtered row-iteration array ───────────────────────────────────────
    <jsonArrayKey>:
      _each: "<SheetName> WHERE [<Sheet>.]<FilterCol> = <value>"
      <jsonKey>: <ColumnName>

    # ── Nested object (no _each) ───────────────────────────────────────────
    <jsonObjectKey>:
      <jsonKey>: <SheetName>.<ColumnName>
      <jsonKey>: <static value>
      
