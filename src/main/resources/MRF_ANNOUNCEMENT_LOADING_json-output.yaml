# ---------------------------------------------------------------------------
# JSON output template — MRF ANNOUNCEMENT_LOADING
# ---------------------------------------------------------------------------
# This file is referenced from MRF_ANNOUNCEMENT_LOADING_validation-rules.yaml
# via:  json_output_file: "MRF_ANNOUNCEMENT_LOADING_json-output.yaml"
#
# It is also consumed directly by:
#   - mop-generator-utility  (MOP generation + approval summary)
#   - network-command-executor-utility  (execution reporting)
#
# Load it independently using JsonOutputLoader:
#   Map<String, Object> template = new JsonOutputLoader().load("...path.../MRF_ANNOUNCEMENT_LOADING_json-output.yaml");
# ---------------------------------------------------------------------------

output_mode: single
data:
  nodeType: MRF
  activity: ANNOUNCEMENT_LOADING
  nodes:
    _each: "DISTINCT INDEX.NODE AS $node"
    node:    $node
    crGroup: INDEX.CRGROUP
    email:   INDEX.EMAIL
    niamID:  "Node_Details.'NIAM NAME' WHERE Node_Details.Node_Name = $node"
    configData:
      _each: "ANNOUNCEMENT_FILES WHERE GROUP = INDEX.GROUP"
      INPUT_FILE: INPUT_FILE
      MRF_DESTINATION_PATH: MRF_DESTINATION_PATH

