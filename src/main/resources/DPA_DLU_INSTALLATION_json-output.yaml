# ---------------------------------------------------------------------------
# JSON output template — SBC FIXED_LINE_CONFIGURATION
# ---------------------------------------------------------------------------
# This file is referenced from SBC_FIXED_LINE_CONFIGURATION_validation-rules.yaml
# via:  json_output_file: "SBC_FIXED_LINE_CONFIGURATION_json-output.yaml"
# ---------------------------------------------------------------------------
# It is also consumed directly by:
#   - JAVA_NOKIA_CLICR_AUTOMATION  (MOP generation + approval summary + execution reporting)
# ---------------------------------------------------------------------------
output_mode: single
data:
    nodeType: DPA
    activity: DLU_INSTALLATION
    nodes:
      _each: "DISTINCT INDEX.REGION AS $region"
      node: $region
      node_details:
        _join: "INDEX.NODE WHERE INDEX.REGION = $region"
        separator: ","
      crGroup:  CRGROUP
      group:    GROUP
      email:    EMAIL
      NODE1_NAME:      "Node_Details.NODE1 WHERE Node_Details.NODE1 = NODE"
      NODE1_NIAM_NAME: "Node_Details.NIAM1_NAME WHERE Node_Details.NODE1 = NODE"
      NODE2_NAME:      "Node_Details.NODE2 WHERE Node_Details.NODE1 = NODE"
      NODE2_NIAM_NAME: "Node_Details.NIAM2_NAME WHERE Node_Details.NODE1 = NODE"
      NEW_FILE_NAME: "PHONESDAT_FILES.NEW_FILE_NAME WHERE PHONESDAT_FILES.GROUP = GROUP"
      NEW_VERSION:   "PHONESDAT_FILES.NEW_VERSION   WHERE PHONESDAT_FILES.GROUP = GROUP"
      TAC_COUNT:     "PHONESDAT_FILES.TAC_COUNT     WHERE PHONESDAT_FILES.GROUP = GROUP"
         
