# =============================================================================
# Validation Rules: MRF - ANNOUNCEMENT_LOADING
# File naming convention: {NODE_TYPE}_{ACTIVITY}_validation-rules.yaml
#
# Use-case: Load announcement audio files (TAR or individual) onto MRF nodes.
#
# CIQ structure:
#   - INDEX sheet: Node | CRGroup | Tables
#   - Data sheets: ANNOUNCEMENT_FILES
#   - Node-ID sheet: Node_Details (Node_Name → NIAM NAME)
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
settings:
  headerRow: 0
  dataStartRow: 1
  trimCellValues: true
  ignoreBlankRows: false
  caseSensitiveHeaders: false
  caseSensitiveValues: true   
 
 # ---------------------------------------------------------------------------
# Cross-sheet (workbook-level) rules
# ---------------------------------------------------------------------------
workbook_rules:
   # every CRGroup value in the Index must have a matching entry in USER_ID
#  - match:
#      from: Index.CRGroup
#      to:   USER_ID.CRGroup
           
sheets:

  # ---------------------------------------------------------------------------
  # Sheet: Index
  # Standard NODE | CRGROUP | TABLES format.
  # ---------------------------------------------------------------------------
  Index:
    columns:
      Node:
        required: true
        description: "MRF Hostname"
        type: string
        pattern: ".*MRF.*"
      CRGroup:
        required: true
        description: "CR Number"
#      Tables:
#        required: true
#        description: "Data sheet name (must match an actual sheet in the workbook)"
#        sheetRef: true
#        sheetRefIgnoreCase: true
      EMAIL:    
        type: email
        multi: true
        description: "Email ID"
        consolidate: true
        minOnePerGroup:
            groupByColumn: CRGroup
  # ---------------------------------------------------------------------------
  # Sheet: Node_Details
  # Maps each MRF hostname to its NIAM login ID.
  # ---------------------------------------------------------------------------
  Node_Details:
    columns:
      Node_Name:
        required: true
        description: "MRF Hostname"
      "NIAM NAME":
        required: true
        description: "NIAM ID for the hostname"
      VER:
        description: "Software version of the MRF node"

  # ---------------------------------------------------------------------------
  # Sheet: ANNOUNCEMENT_FILES
  # One row per announcement file to be loaded onto MRF nodes.
  # ---------------------------------------------------------------------------
  ANNOUNCEMENT_FILES:
    columns:
      GROUP:
        required: true
        description: "Group name for the configuration changes"
      INPUT_FILE:
        required: true
        maxLength: 512
      MRF_DESTINATION_PATH:
        required: true
        pattern: "^/.*"
        patternMessage: "MRF Destination Path must be an absolute Unix path starting with /"
        maxLength: 1024

          # ---------------------------------------------------------------------------
  # Sheet: USER_ID
  # Maps each CRGROUP to its EMAIL.
  # ---------------------------------------------------------------------------
#  USER_ID:
#    columns:
#      CRGroup:
#        required: true
#        description: "CR Number"
#      EMAIL:
#        required: true
#        type: email
#        multi: false
#        description: "Email ID"

# ---------------------------------------------------------------------------
# Validation report output configuration
# ---------------------------------------------------------------------------
report_output:
  formats: [JSON, HTML, MSEXCEL]
  filename: "{nodeType}_{activity}_VALIDATION_REPORT"

# ---------------------------------------------------------------------------
# Post-validation outputs (computed only when validation passes)
# ---------------------------------------------------------------------------
# Each entry key is used as the parameter name unless 'name' is specified.
# Supported aggregates: distinct | count | sum
# ---------------------------------------------------------------------------
outputs:
  # Distinct CR group identifiers from the Index sheet
  CR_LIST:
    sheet: INDEX
    column: CRGROUP
    aggregate: distinct
    separator: ","

  # Count of unique CRGroup values
  CR_COUNT:
    sheet: INDEX
    column: CRGROUP
    aggregate: distinct_count


