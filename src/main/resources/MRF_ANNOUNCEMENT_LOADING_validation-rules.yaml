# =============================================================================
# Validation Rules: MRF - ANNOUNCEMENT_LOADING
# File naming convention: {NODE_TYPE}_{ACTIVITY}_validation-rules.yaml
#
# Use-case: Load announcement audio files (TAR or individual) onto MRF nodes.
#
# CIQ Sheet validated: ANNOUNCEMENT_FILES
#   GROUP mode columns: GROUP, Action, VERSION, INPUT_FILE, MRF_DESTINATION_PATH
#
# Notes:
#   - GROUP mode: INDEX sheet has GROUP | NODE columns (no TABLES).
#     Group-to-node expansion is detected automatically; validateNodeIds checks
#     all nodes in every group against the NODE_ID sheet.
#   - ACTION column is validated: only LOAD is an allowed value.
# =============================================================================

# INDEX sheet has GROUP|NODE format (no TABLES column) — no cross-sheet validation
validateIndexSheets: false

# Validate that each node in the GROUP→NODE index exists in the NODE_ID sheet
validateNodeIds: true

# GROUP mode: INDEX sheet uses GROUP|NODE columns; one MOP folder per group
groupByColumnName: GROUP

# Validate columns in the INDEX sheet (GROUP|NODE format for MRF)
indexSheet:
  columns:
    GROUP:
      required: true
    NODE:
      required: true

# Validate columns in the NODE_ID sheet
nodeIdSheet:
  columns:
    NODE:
      required: true
    NIAM_ID:
      required: true

sheets:

  # ---------------------------------------------------------------------------
  # Sheet: ANNOUNCEMENT_FILES
  # One row per announcement file to be loaded onto MRF nodes.
  # ---------------------------------------------------------------------------
  ANNOUNCEMENT_FILES:
    columns:
      GROUP:
        required: true
      VERSION:
        required: true
        pattern: "^\\d+\\.\\d+\\.\\d+\\.\\d+$"
        patternMessage: "VERSION must be in format X.X.X.X (e.g. 17.0.3.7)"

      INPUT_FILE:
        required: true
        maxLength: 512

      MRF_DESTINATION_PATH:
        required: true
        pattern: "^/.*"
        patternMessage: "MRF Destination Path must be an absolute Unix path starting with /"
        maxLength: 1024
