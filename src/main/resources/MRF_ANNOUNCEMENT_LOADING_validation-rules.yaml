# =============================================================================
# Validation Rules: MRF - ANNOUNCEMENT_LOADING
# File naming convention: {NODE_TYPE}_{ACTIVITY}_validation-rules.yaml
#
# Use-case: Load announcement audio files (TAR or individual) onto MRF nodes.
#
# CIQ Sheet validated: ANNOUNCEMENT_FILES
#   CRGROUP mode columns: GROUP, Action, VERSION, INPUT_FILE, MRF_DESTINATION_PATH
#
# Notes:
#   - CRGROUP mode: INDEX sheet has GROUP | CRGROUP | NODE columns (no TABLES).
#     GROUP drives MOP content — all nodes in the same GROUP get identical rows.
#     CRGROUP drives execution and approval — nodes in the same CRGROUP are
#     executed in the same change window (in parallel by NCE).
#     validateNodeIds checks every node in every GROUP against the NODE_ID sheet.
#   - ciq-processor writes one sub-folder per CRGROUP value containing a
#     CRGroupIndex JSON and per-GROUP data files.
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
settings:
  headerRow: 0
  dataStartRow: 1
  trimCellValues: true
  ignoreBlankRows: false
  caseSensitiveHeaders: false
  caseSensitiveValues: true


# INDEX sheet has GROUP|CRGROUP|NODE format (no TABLES column) — no cross-sheet validation
validateIndexSheets: false

# Validate that each node in the GROUP→NODE index exists in the NODE_ID sheet
validateNodeIds: true

# CRGROUP mode: INDEX sheet uses GROUP|CRGROUP|NODE columns; one MOP folder per CRGROUP
groupByColumnName: CRGROUP

# ---------------------------------------------------------------------------
# Special sheet identity — sheet names only; column names live inside each
# sheet's own definition under sheets:
# ---------------------------------------------------------------------------
nodeIdSheetName: Node_Details
userIdSheetName: User_ID

sheets:

  # ---------------------------------------------------------------------------
  # Sheet: Index
  # GROUP | CRGROUP | NODE format — one row per node assignment.
  # ---------------------------------------------------------------------------
  Index:
    columns:
      GROUP:
        required: true
      CRGROUP:
        required: true
        description: "CR Number"
      NODE:
        required: true
        description: "MRF Hostname"
      Tables:
        required: true
        description: "Table or sheets names"

  # ---------------------------------------------------------------------------
  # Sheet: Node_Details
  # Maps each MRF hostname to its NIAM login ID.
  # ---------------------------------------------------------------------------
  Node_Details:
    nodeColumn: Node_Name
    niamColumn: "NIAM NAME"
    columns:
      Node_Name:
        required: true
        description: "MRF Hostname"
      "NIAM NAME":
        required: true
        description: "NIAM ID for the hostname"

  # ---------------------------------------------------------------------------
  # Sheet: User_ID
  # Maps each CRGROUP to the responsible user's email address.
  # ---------------------------------------------------------------------------
  User_ID:
    crGroupColumn: CRGROUP
    emailColumn: EMAIL
    columns:
      CRGROUP:
        required: true
        description: "CR Number. Should match Index sheet"
      EMAIL:
        required: true
        type: email
        description: "Email address(es) of the user(s) responsible for executing the CR, used for sending notifications related to execution status, reports, and alerts. Can hold a comma-separated list"

  # ---------------------------------------------------------------------------
  # Sheet: ANNOUNCEMENT_FILES
  # One row per announcement file to be loaded onto MRF nodes.
  # ---------------------------------------------------------------------------
  ANNOUNCEMENT_FILES:
    columns:
      GROUP:
        required: true
      INPUT_FILE:
        required: true
        maxLength: 512
      MRF_DESTINATION_PATH:
        required: true
        pattern: "^/.*"
        patternMessage: "MRF Destination Path must be an absolute Unix path starting with /"
        maxLength: 1024
