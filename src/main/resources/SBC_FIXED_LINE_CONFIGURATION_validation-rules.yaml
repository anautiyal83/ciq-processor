# =============================================================================
# Validation Rules: SBC - FIXED_LINE_CONFIGURATION
# File naming convention: {NODE_TYPE}_{ACTIVITY}_validation-rules.yaml
#
# Use-case:
#   Validate SBC Fixed Line Configuration CIQ sheets.
#   Covers 18 sheets: Index, IP, and 16 record-based configuration tables.
# =============================================================================

version: "1.0"

# -----------------------------------------------------------------------------
# Global settings
# -----------------------------------------------------------------------------
settings:
  headerRow: 0
  dataStartRow: 1
  trimCellValues: true
  ignoreBlankRows: true
  caseSensitiveHeaders: false
  caseSensitiveValues: true

# -----------------------------------------------------------------------------
# Workbook-level cross-sheet rules
# -----------------------------------------------------------------------------
workbook_rules:

  # Index.NODE must exist in IP.NODE
  - match:
      from: Index.NODE
      to: IP.NODE

  # Every GROUP declared in Index must exist in each included table sheet's Group column.
  # If a table sheet is present in the CIQ but missing the declared group, validation fails.
  # If a table sheet is absent (required: false), the rule is skipped for that sheet.
  - match:
      from: Index.GROUP
      to: CRFTargetList.Group
  - match:
      from: Index.GROUP
      to: PeeringSDPProfileTable.Group
  - match:
      from: Index.GROUP
      to: BorderGatewayPublishedRealmTab.Group
  - match:
      from: Index.GROUP
      to: IbcfVirtualNetworkTable.Group
  - match:
      from: Index.GROUP
      to: ServiceProfileTable.Group
  - match:
      from: Index.GROUP
      to: PFEDPortTable.Group
  - match:
      from: Index.GROUP
      to: PublishedRealmTable.Group
  - match:
      from: Index.GROUP
      to: IbcfSipProfileTable.Group
  - match:
      from: Index.GROUP
      to: IbcfTrunkGroupTable.Group
  - match:
      from: Index.GROUP
      to: CRFDATable.Group
  - match:
      from: Index.GROUP
      to: CRFRoutePlan.Group
  - match:
      from: Index.GROUP
      to: CRFRoutePriorityList.Group
  - match:
      from: Index.GROUP
      to: CRFRouteProfile.Group
  - match:
      from: Index.GROUP
      to: CRFTreatment.Group
  - match:
      from: Index.GROUP
      to: CRFHostURITable.Group
  - match:
      from: Index.GROUP
      to: IbcfIngressTrunkGroupMappingTab.Group

# -----------------------------------------------------------------------------
# Sheet-wise validation rules
# -----------------------------------------------------------------------------
sheets:

  # ---------------------------------------------------------------------------
  # Sheet: Index
  # ---------------------------------------------------------------------------
  Index:
    required: true
    columns:

      NODE:
        required: true
        type: string
        pattern: ".*SBC.*"
        description: "SBC Hostname (must contain SBC)"

      GROUP:
        required: true
        type: string
        description: "Group name for the configuration changes"

      TABLES:
        required: true
        type: string
        description: "Table Name of Configuration"

      CATEGORY:
        required: true
        type: string
        allowedValues: [RecordBased, Global]
        description: "Category - RecordBased or Global level configuration"

      EMAIL:
        required: true
        type: email
        description: "Email ID of the requestor"

  # ---------------------------------------------------------------------------
  # Sheet: IP
  # ---------------------------------------------------------------------------
  IP:
    required: true
    columns:

      NODE:
        required: true
        type: string
        pattern: ".*SBC.*"
        description: "SBC Hostname (must contain SBC)"

      NIAM NAME:
        required: true
        type: string
        unique: true
        description: "NIAM ID for the hostname - must be unique to each node"

  # ---------------------------------------------------------------------------
  # Sheet: CRFTargetList
  # ---------------------------------------------------------------------------
  CRFTargetList:
    required: false
    required_if_listed_in: Index.TABLES
    columns:

      Group:
        required: true
        type: string
        description: "Group name for the configuration changes"

      Action:
        required: true
        type: string
        allowedValues: [CREATE, DELETE, MODIFY]
        description: "Action to be performed"

      SubAction:
        required: true
        type: string
        allowedValues: [RECORD, SUBRECORD]
        description: "Operation level"

      ActionKey:
        required: false
        type: string
        description: "Required when SubAction is SUBRECORD"

      ID:
        required: true
        type: integer
        minValue: 1
        maxValue: 6000
        description: "ID of the table"

      NAME:
        required: false
        type: string
        maxLength: 19
        pattern: "(\\S|\\S[a-zA-Z0-9\\*#\\.,\\-+'~`!@$%^:;=(){}\\[\\]?\"'&<>/_|\\\\ ]*\\S)"
        description: "Logical name of the table"

      Record.TARGET_LIST_ID:
        required: true
        type: integer
        minValue: 1
        maxValue: 100000
        description: "The CRF Target List Record ID"

      Record.DESCRIPTION:
        required: false
        type: string
        maxLength: 32
        pattern: "[a-zA-Z0-9\\*#\\.,\\-+'~`!@$%^:;=(){}\\[\\]?\"'&<>/_|\\\\ ]*"
        description: "Required when Action is CREATE"

      Record.LOCATION:
        required: false
        type: string
        allowedValues: [Access, Core, Fixed-Access]
        description: "Required when Action is CREATE"

      Record.TARGET_TYPE:
        required: false
        type: string
        allowedValues: ["Type 1", "Type 2", "IBCF Trunk Group"]
        description: "Required when Action is CREATE"

      Record.CRFTargetListEntry.TARGET_ID:
        required: false
        type: integer
        minValue: 0
        maxValue: 7048
        description: "Required when Action is CREATE; range 1..1024, 5001..7048, or 0"

      Record.CRFTargetListEntry.TRANSPORT_TYPE:
        required: false
        type: string
        allowedValues: [UDP, TCP, SCTP, TLS, ANY]
        description: "Required when Action is CREATE"

      Record.CRFTargetListEntry.VN_ID:
        required: false
        type: integer
        minValue: 0
        maxValue: 4096
        description: "Virtual Network ID; must be 0 when TARGET_TYPE is IBCF Trunk Group"

      Record.CRFTargetListEntry.TG_ID:
        required: false
        type: integer
        minValue: 0
        maxValue: 32
        description: "Trunk Group ID; must be 0 when TARGET_TYPE is not IBCF Trunk Group"

      Record.CRFTargetListEntry.ORDER:
        required: false
        type: string
        allowedValues: ["10", "20"]
        description: "10=preferred, 20=alternate"

      Record.CRFTargetListEntry.PRIORITY:
        required: false
        type: string
        allowedValues: ["10", "20", "30"]
        description: "10=preferred, 20=second choice, 30=tertiary"

      Record.CRFTargetListEntry.WEIGHT:
        required: false
        type: integer
        minValue: 0
        maxValue: 100
        description: "Relative weight for equal Order and Priority"

      Record.CRFTargetListEntry.COST_TBL_INDEX:
        required: false
        type: integer
        minValue: 0
        maxValue: 2500
        description: "Time of Day Cost Table Index"

      Record.TARGET_LIST_SELECTION_OPTION:
        required: false
        type: string
        allowedValues: ["Order/Priority/Weight", "TOD Cost Index"]

    rules:
      - require: ActionKey
        when:
          column: SubAction
          operator: eq
          value: SUBRECORD
      - require: Record.DESCRIPTION
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.LOCATION
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.TARGET_TYPE
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.CRFTargetListEntry.TARGET_ID
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.CRFTargetListEntry.TRANSPORT_TYPE
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.CRFTargetListEntry.VN_ID
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.CRFTargetListEntry.TG_ID
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.CRFTargetListEntry.ORDER
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.CRFTargetListEntry.PRIORITY
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.CRFTargetListEntry.WEIGHT
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.CRFTargetListEntry.COST_TBL_INDEX
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.TARGET_LIST_SELECTION_OPTION
        when:
          column: Action
          operator: eq
          value: CREATE

  # ---------------------------------------------------------------------------
  # Sheet: PeeringSDPProfileTable
  # ---------------------------------------------------------------------------
  PeeringSDPProfileTable:
    required: false
    required_if_listed_in: Index.TABLES
    columns:

      Group:
        required: true
        type: string

      Action:
        required: true
        type: string
        allowedValues: [CREATE, DELETE, MODIFY]

      SubAction:
        required: true
        type: string
        allowedValues: [RECORD, SUBRECORD]

      ActionKey:
        required: false
        type: string

      ID:
        required: true
        type: integer
        minValue: 0
        maxValue: 1630

      NAME:
        required: false
        type: string
        maxLength: 19
        pattern: "(\\S|\\S[a-zA-Z0-9\\*#\\.,\\-+'~`!@$%^:;=(){}\\[\\]?\"'&<>/_|\\\\ ]*\\S)"

      Record.PROFILEID:
        required: false
        type: integer
        minValue: 1
        maxValue: 2048
        description: "Required when Action is CREATE"

      Record.DESCRIPTION:
        required: false
        type: string
        maxLength: 128
        pattern: "[a-zA-Z0-9\\*#\\.,\\-'!$()&><%/=;\\\\ ]*"

      Record.SDP_OFFER_FROM_PEERING_SIDE:
        required: false
        type: string
        allowedValues: [Yes, No]

      Record.SDP_ANSWER_FROM_PEERING_SIDE:
        required: false
        type: string
        allowedValues: [Yes, No]

      Record.SDP_OFFER_FROM_CORE_SIDE:
        required: false
        type: string
        allowedValues: [Yes, No]

      Record.SDP_ANSWER_FROM_CORE_SIDE:
        required: false
        type: string
        allowedValues: [Yes, No]

      Record.GoldenCodecSet.GOLDEN_CODEC:
        required: false
        type: string
        allowedValues: [PCMU, PCMA, G723, G729, AMR, EVRC0, EVRCB0, G726-16, G726-24, G726-32, G726-40, G728, AMR-WB, GSM, GSM-EFR, GSM-HR, G722, OPUS, EVS]

      Record.CodecBandwidth.CODEC:
        required: false
        type: string
        allowedValues: [H263-2000, H264, MP4V-ES, PCMU, PCMA, G723, G729, AMR, EVRC0, EVRCB0, G726-16, G726-24, G726-32, G726-40, G728, AMR-WB, GSM, GSM-EFR, GSM-HR, G722, OPUS, EVS, SILK-NB, SILK-MB, SILK-WB, SILK-SWB, iSAC-16, iSAC-32, VP8, t140]

      Record.CodecBandwidth.BANDWIDTH:
        required: false
        type: integer
        minValue: 0
        maxValue: 10240

      Record.CodecBandwidth.CODEC_PEAK_BANDWIDTH:
        required: false
        type: integer
        minValue: 0
        maxValue: 20480

      Record.CodecBandwidth.CODEC_MAX_BURST_SIZE:
        required: false
        type: integer
        minValue: 0
        maxValue: 20480

      Record.DEFAULTAUDIOBANDWIDTH:
        required: false
        type: integer
        minValue: 0
        maxValue: 510

      Record.DEFAULT_AUDIO_CODEC_PEAK_BANDWIDTH:
        required: false
        type: integer
        minValue: 0
        maxValue: 2048

      Record.DEFAULT_AUDIO_CODEC_MAX_BURST_SIZE:
        required: false
        type: integer
        minValue: 0
        maxValue: 2048

      Record.DEFAULTVIDEOBANDWIDTH:
        required: false
        type: integer
        minValue: 0
        maxValue: 10240

      Record.DEFAULT_VIDEO_CODEC_PEAK_BANDWIDTH:
        required: false
        type: integer
        minValue: 0
        maxValue: 20480

      Record.DEFAULT_VIDEO_CODEC_MAX_BURST_SIZE:
        required: false
        type: integer
        minValue: 0
        maxValue: 20480

      Record.MAXIMUMPACKETTIME:
        required: false
        type: integer
        minValue: 0
        maxValue: 255

      Record.AuxiliaryCodecSet.AUXILIARY_CODEC:
        required: false
        type: string
        allowedValues: [CN, DTMF]

      Record.SDES_SRTP_SUPPORTED:
        required: false
        type: string
        allowedValues: [No, "Non-3GPP SDES-SRTP", "3GPP SDES-SRTP"]

      Record.LATCH_4_MEDIA_CONNECTIONS:
        required: false
        type: string
        allowedValues: [Yes, No]

      Record.RTCP_MUX_SUPPORT:
        required: false
        type: string
        allowedValues: [Yes, No]

      Record.ICE_SUPPORT:
        required: false
        type: string
        allowedValues: [No, "ICE Lite Support Peering"]

      Record.SIGNAL_ICE_LITE_IN_SDP:
        required: false
        type: string
        allowedValues: [Yes, No]

      Record.RINGBACK_TONE_FOR_CALLING_PARTY:
        required: false
        type: string
        allowedValues: [Off, "MS Teams Support", "Carrier Support"]

      Record.SEND_RBT_SDP_ANSWER_TO_CALLING_PARTY:
        required: false
        type: string
        allowedValues: [On, Off]

    rules:
      - require: ActionKey
        when:
          column: SubAction
          operator: eq
          value: SUBRECORD
      - require: Record.PROFILEID
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.DESCRIPTION
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.SDP_OFFER_FROM_PEERING_SIDE
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.SDP_ANSWER_FROM_PEERING_SIDE
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.SDP_OFFER_FROM_CORE_SIDE
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.SDP_ANSWER_FROM_CORE_SIDE
        when:
          column: Action
          operator: eq
          value: CREATE

  # ---------------------------------------------------------------------------
  # Sheet: BorderGatewayPublishedRealmTab
  # ---------------------------------------------------------------------------
  BorderGatewayPublishedRealmTab:
    required: false
    required_if_listed_in: Index.TABLES
    columns:

      Group:
        required: true
        type: string

      Action:
        required: true
        type: string
        allowedValues: [CREATE, DELETE, MODIFY]

      SubAction:
        required: true
        type: string
        allowedValues: [RECORD, SUBRECORD]

      ActionKey:
        required: false
        type: string

      ID:
        required: true
        type: integer
        minValue: 1
        maxValue: 999
        description: "ID of the table"

      NAME:
        required: false
        type: string
        maxLength: 19
        pattern: "(\\S|\\S[a-zA-Z0-9\\*#\\.,\\-+'~`!@$%^:;=(){}\\[\\]?\"'&<>/_|\\\\ ]*\\S)"

      Record.BORDER_GATEWAY:
        required: false
        type: integer
        minValue: 1024
        maxValue: 1346
        description: "Required when Action is CREATE; must equal COMPONENTNUMBER of Border GW component"

      Record.PUBLISHED_REALM_ENTRY.PUBLISHED_REALM_ID:
        required: false
        type: integer
        minValue: 1
        maxValue: 1024
        description: "Required when Action is CREATE; must be previously created in PublishedRealmTable"

    rules:
      - require: ActionKey
        when:
          column: SubAction
          operator: eq
          value: SUBRECORD
      - require: Record.BORDER_GATEWAY
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.PUBLISHED_REALM_ENTRY.PUBLISHED_REALM_ID
        when:
          column: Action
          operator: eq
          value: CREATE

  # ---------------------------------------------------------------------------
  # Sheet: IbcfVirtualNetworkTable
  # ---------------------------------------------------------------------------
  IbcfVirtualNetworkTable:
    required: false
    required_if_listed_in: Index.TABLES
    columns:

      Group:
        required: true
        type: string

      Action:
        required: true
        type: string
        allowedValues: [CREATE, DELETE, MODIFY]

      SubAction:
        required: true
        type: string
        allowedValues: [RECORD, SUBRECORD]

      ActionKey:
        required: false
        type: string

      ID:
        required: true
        type: integer
        minValue: 0
        maxValue: 1628

      NAME:
        required: false
        type: string
        maxLength: 19
        pattern: "(\\S|\\S[a-zA-Z0-9\\*#\\.,\\-+'~`!@$%^:;=(){}\\[\\]?\"'&<>/_|\\\\ ]*\\S)"

      Record.VN_ID:
        required: true
        type: integer
        minValue: 1
        maxValue: 4096
        description: "Virtual Network ID"

      Record.VN_NAME:
        required: false
        type: string
        maxLength: 32
        pattern: "[a-zA-Z0-9\\*#\\.,\\-+'~`!@$%^:;=(){}\\[\\]?\"'&<>/_|\\\\ ]*"
        description: "Required when Action is CREATE"

      Record.VN_TYPE:
        required: false
        type: string
        allowedValues: [Core, Peer]
        description: "Required when Action is CREATE; cannot be changed for existing VN"

      Record.SERVICE_LEVEL_POLICY_ID:
        required: true
        type: integer
        minValue: 0
        description: "0 or equal to ServiceProfileTable.POLICY_ID"

      Record.SIP_ERROR_RESP_CODE:
        required: false
        type: integer
        minValue: 0
        maxValue: 699
        description: "Required when Action is CREATE; error response sent when request rejected due to CAC"

      Record.PEERING_ISGW_PROFILE_ID:
        required: true
        type: integer
        minValue: 0
        maxValue: 2048

      Record.MEDIA_REALM:
        required: false
        type: integer
        description: "Required when Action is CREATE"

      Record.TRUNK_CONTEXT:
        required: false
        type: string
        maxLength: 128
        pattern: "[a-zA-Z0-9\\*#\\.,\\-'!$()&><%/=;\\\\ ]*"
        description: "Required when Action is CREATE"

      Record.CFED_PORT:
        required: false
        type: string
        description: "Required when Action is CREATE; empty when VN_TYPE=Peer"

      Record.PFED_PORT:
        required: false
        type: string
        description: "Required when Action is CREATE; empty when VN_TYPE=Core"

      Record.SPARE_TABLE_ID:
        required: true
        type: integer
        minValue: 0
        maxValue: 10000

      Record.MEASUREMENT_TG_TRAFFIC:
        required: false
        type: string
        allowedValues: [Yes, No]
        description: "Required when Action is CREATE"

      Record.MEASUREMENT_ISGW_POLICY:
        required: false
        type: string
        allowedValues: [Yes, No]
        description: "Required when Action is CREATE"

      Record.MEASUREMENT_CAC:
        required: false
        type: string
        allowedValues: [Yes, No]
        description: "Required when Action is CREATE"

      Record.ENABLE_STIR_SHAKEN:
        required: false
        type: string
        allowedValues: [Yes, No]
        description: "Required when Action is CREATE"

      Record.VERIFICATION_FAILURE_ACTION:
        required: false
        type: string
        allowedValues: ["Verification Server Action", Continue]
        description: "Required when Action is CREATE; must be 0 if ENABLE_STIR_SHAKEN is No"

    rules:
      - require: ActionKey
        when:
          column: SubAction
          operator: eq
          value: SUBRECORD
      - require: Record.VN_NAME
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.VN_TYPE
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.SIP_ERROR_RESP_CODE
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.MEDIA_REALM
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.TRUNK_CONTEXT
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.MEASUREMENT_TG_TRAFFIC
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.MEASUREMENT_ISGW_POLICY
        when:
          column: Action
          operator: eq
          value: CREATE
      - require: Record.MEASUREMENT_CAC
        when:
          column: Action
          operator: eq
          value: CREATE

