# Validation rules for: SBC - FIXED_LINE_CONFIGURATION
# File naming convention: {NODE_TYPE}_{ACTIVITY}_validation-rules.yaml
#
# Rules are applied to every data row in each sheet.
# Add a new use case by creating a new YAML file - zero code changes required.

# Validate all tables listed in Index have matching JSON files
validateIndexSheets: true

# Validate Node column values exist in Node_ID sheet
validateNodeIds: true

# NODE mode: INDEX sheet uses Node|CRGroup|Tables columns; one MOP folder per node
groupByColumnName: NODE

# ---------------------------------------------------------------------------
# Special sheet identity — sheet names only; column names live inside each
# sheet's own definition under sheets:
# ---------------------------------------------------------------------------
nodeIdSheetName: Node_ID

sheets:

########### Index ##############
  Index:
    columns:
      Node:
        required: true
      CRGroup:
        required: true
      Tables:
        required: true

########### Node_ID ##############
  Node_ID:
    nodeColumn: Node
    niamColumn: NIAM
    columns:
      Node:
        required: true
      NIAM:
        required: true

########### CRFTargetList ##############
  CRFTargetList:
    columns:
      Node:
        required: true
        crossRef:
          sheet: "_index"
          column: node
      Action:
        required: true
        type: enum
        values: [CREATE, DELETE, MODIFY]
      ActionKey:
        requiredWhen:
          column: Action
          value: MODIFY
      SubAction:
        requiredWhen:
          column: Action
          value: MODIFY
        type: enum
        values: [ADD, DEL, MOD]
      ID:
        required: true
        integer: true
        minValue: 1
        maxValue: 6000
      NAME:
        requiredWhen:
          column: Action
          value: CREATE
        minLength: 1
        maxLength: 19
      Record.TARGET_LIST_ID:
        requiredWhen:
          column: Action
          value: CREATE
        integer: true
        minValue: 1
        maxValue: 100000
      Record.DESCRIPTION:
        maxLength: 32
      Record.LOCATION:
        type: enum
        values: [Access, Core]
      Record.TARGET_TYPE:
        type: enum
        values: ["Type 1", "Type 2", "IBCF Trunk Group"]
      Record.CRFTargetListEntry.TRANSPORT_TYPE:
        type: enum
        values: [UDP, TCP, SCTP, TLS, ANY]
      Record.CRFTargetListEntry.ORDER:
        type: enum
        values: ["10", "20"]
      Record.CRFTargetListEntry.PRIORITY:
        type: enum
        values: ["10", "20", "30"]
      Record.CRFTargetListEntry.WEIGHT:
        integer: true
        minValue: 0
        maxValue: 100
      Record.TARGET_LIST_SELECTION_OPTION:
        type: enum
        values: ["Order/Priority/Weight","Weight/Order/Priority", "TOD Cost Index"]

